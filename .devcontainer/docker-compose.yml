version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: vite_devcontainer

    volumes:
      - ..:/workspace
      - node-modules:/workspace/node_modules
      - npm-cache:/home/node/.npm

    working_dir: /workspace

    ports:
      - "5173:5173"

    command: sleep infinity

volumes:
  node-modules:
  npm-cache:
